[manager]
ratio = [1, 3, 4]

sort_by = "natural"

sort_sensitive = false  
sort_reverse = false
sort_dir_first = true   

show_hidden = false 

show_symlink = true

scrolloff = 5

[preview]
image_protocol = "kitty"

max_width = 600
max_height = 900

image_delay = 30
image_filter = "lanczos3"

image_quality = 75
sixel_scale = 1.0

[opener]

edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true },
]

open = [
  { run = 'xdg-open "$@"', desc = "xdg-open" },
]

reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal in file manager" },
]

play = [
  { run = 'mpv "$@"', desc = "mpv", orphan = true },
]

view_image = [
  { run = 'imv "$@"', desc = "imv", orphan = true },
]

extract = [
  { run = 'ouch decompress "$@"', desc = "ouch", block = true },
]

[open]
rules = [
  { mime = "text/*",              use = ["edit", "open"] },
  { mime = "application/json",    use = ["edit", "open"] },
  { mime = "application/xml",     use = ["edit", "open"] },
  { name = "*.toml",              use = ["edit"] },
  { name = "*.yaml",              use = ["edit"] },
  { name = "*.yml",               use = ["edit"] },
  { name = "*.md",                use = ["edit", "open"] },

  { mime = "image/*",             use = ["view_image", "open"] },

  { mime = "video/*",             use = ["play", "open"] },
  { mime = "audio/*",             use = ["play", "open"] },

  { mime = "application/gzip",            use = ["extract"] },
  { mime = "application/x-tar",           use = ["extract"] },
  { mime = "application/x-bzip2",         use = ["extract"] },
  { mime = "application/x-7z-compressed", use = ["extract"] },
  { mime = "application/zstd",            use = ["extract"] },

  { mime = "application/pdf",     use = ["open"] },

  { mime = "*",                   use = ["open"] },
]

[tasks]
micro_workers = 10
macro_workers = 5

bizarre_retry = 3

[log]
enabled = false

[plugin]
prepend_fetchers = [
  { id = "git", url = "*",  run = "git" },
  { id = "git", url = "*/", run = "git" },
]

prepend_previewers = [
  { mime = "application/zip",              run = "ouch" },
  { mime = "application/gzip",             run = "ouch" },
  { mime = "application/x-tar",            run = "ouch" },
  { mime = "application/x-bzip2",          run = "ouch" },
  { mime = "application/x-7z-compressed",  run = "ouch" },
  { mime = "application/zstd",             run = "ouch" },
]
